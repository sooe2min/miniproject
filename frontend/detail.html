<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상세 페이지</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="debug.css" />
    <link rel="stylesheet" href="./job-header.css" />
    <link rel="stylesheet" href="./job-illust.css" />
    <link rel="stylesheet" href="./roadmap-card.css" />
    <link rel="stylesheet" href="./core-competencies.css" />
    <link rel="stylesheet" href="./job-postings.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- ================================================
         GNB — 글로벌 내비게이션 바
         [구조] 로고(좌) + 경로 표시(우측 끝, margin-left:auto로 밀림)
         ================================================ -->
      <header>
        <nav class="gnb-container">
          <div class="gnb-logo-area">
            <img
              src="./assets/images/salesforce.png"
              alt="SF 취업 가이드 로고"
            />
          </div>

          <span class="gnb-service-name">SF 취업 가이드</span>

          <!-- 브레드크럼: 홈 → [직무명] — gnb.js가 직무명을 URL 파라미터로 동적 주입 -->
          <div class="gnb-breadcrumb-area">
            <span class="gnb-bc-home">홈</span>
            <span class="gnb-bc-sep">→</span>
            <span class="gnb-bc-job" id="gnb-bc-job">Developer</span>
          </div>
        </nav>
      </header>

      <!-- ================================================
         메인 콘텐츠 영역
         ================================================ -->
      <main class="main-content">
        <!-- Detail Main Splitter
           [구조] 좌측 사이드바(1) : 우측 메인 콘텐츠(3) — 1:3 비율 가로 분할 -->
        <div class="detail-main-splitter">
          <!-- ============================================
             Left Column — 사이드바 + "이 페이지에서" 박스를 세로로 묶는 래퍼
             ============================================ -->
          <div class="left-column-wrapper">
            <!-- Left Sidebar: 직무 선택 메뉴 목록 -->
            <aside class="left-sidebar-box">
              <!-- [팀원 가이드] 이 박스 내부에 사이드바 메뉴 항목들을
                 세로(flex-direction: column)로 나열하여 자유롭게 구현하세요.
                 예: 홈으로 / Administrator / Developer / Consultant / Power User -->
              <!-- 아래는 job 쿼리스트링으로 직무를 전환하기 위한 최소 뼈대 링크입니다.
                 아이콘/선택 상태 강조 등 나머지 꾸밈은 자유롭게 채워주세요. -->
              <a href="index.html">← 홈으로</a>
              <a href="detail.html?job=admin">Administrator</a>
              <a href="detail.html?job=dev">Developer</a>
              <a href="detail.html?job=consultant">Consultant</a>
              <a href="detail.html?job=pu">Power User</a>
            </aside>

            <!-- Page Summary Box: "이 페이지에서" 요약 컴포넌트 -->
            <div class="page-summary-box">
              <!-- [팀원 가이드] 이 박스 내부에 현재 페이지에서 확인할 수 있는
                 항목 목록(예: 핵심 역량 스텟, 적합성 검사 결과, 추천 자격증 로드맵, 채용 공고)을
                 세로(flex-direction: column)로 자유롭게 구현하세요. -->
            </div>
          </div>

          <!-- ============================================
             Right Main Content
             [구조] 2개의 섹션(헤더, 미드)이 세로로 쌓이는 메인 영역
             ============================================ -->
          <div class="right-main-content">
            <!-- 1. Header Section
               [구조] 텍스트 영역(좌) ←→ 일러스트 영역(우) 가로 배치 -->
            <section class="detail-header-section">
              <div class="detail-header-text-area">
                <!-- [팀원 가이드] 이 박스 내부에 직무 타이틀, 부제목,
                   설명 텍스트를 세로(column)로 자유롭게 구현하세요.
                   예: <h2> 직무명, <p> 한 줄 소개 -->
              </div>

              <div class="detail-header-illust-area">
                <!-- [팀원 가이드] 이 박스 내부에 직무 대표 일러스트 이미지를
                   자유롭게 구현하세요. 예: <img src="..." /> -->
              </div>
            </section>

            <!-- 2. Mid Content — 좌(적합성 체크리스트) / 우(추천 자격증 로드맵) 가로 2분할 -->
            <section class="mid-content-flex-layout">
              <!-- Left: 적합성 체크리스트 -->
              <div class="checklist-card-box">
                <!-- 핵심 역량 스텟 컴포넌트 (core-competencies.css / core-competencies.js)
                     직무(job) 쿼리스트링이 바뀔 때마다 db.json의 careers[].skills를 새로 fetch해서 렌더링함 -->
                <div class="stat-card">
                  <!-- 헤더 -->
                  <div class="stat-header">
                    <span class="stat-title">핵심 역량 스텟</span>
                    <span class="stat-subtitle">(6개 중 선택)</span>
                  </div>

                  <!-- 체크박스 목록 (core-competencies.js가 db.json을 fetch해 동적으로 채움) -->
                  <div class="stat-list" id="cc-stat-list"></div>

                  <!-- 결과 섹션 -->
                  <div class="result-section">
                    <p class="result-label">직합성 검사 결과</p>
                    <div class="result-body">
                      <!-- 원형 진행 차트 -->
                      <div class="progress-ring">
                        <svg viewBox="0 0 100 100" class="ring-svg">
                          <circle class="ring-track" cx="50" cy="50" r="38" />
                          <circle
                            class="ring-fill"
                            cx="50"
                            cy="50"
                            r="38"
                            id="cc-ring-progress"
                          />
                        </svg>
                        <span class="ring-pct" id="cc-ring-pct">0%</span>
                      </div>

                      <!-- 결과 텍스트 -->
                      <div class="result-info">
                        <p class="result-selected" id="cc-result-selected">
                          6개 중 0개를 선택했어요!
                        </p>
                        <p class="result-desc" id="cc-result-desc">
                          직무에 적합하지 않을 수 있어요.
                        </p>
                        <p class="result-tip">
                          <span class="tip-label">TIP</span> 5개 이상 선택하면
                          만점으로 판단해요.
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Right: 추천 자격증 로드맵 -->
              <div class="roadmap-card-box">
                <!-- [팀원 가이드] 이 박스는 추천 자격증 로드맵 컴포넌트 영역입니다.
                   내부 레이아웃 방향(column/row)은 팀원이 자유롭게 결정하세요. -->
              </div>
            </section>
          </div>
          <!-- end: right-main-content -->
        </div>
        <!-- end: detail-main-splitter -->

        <!-- Job Postings Section — 사이드바 영역 밖, 전체 너비로 꽉 참
             [구조] 상단 타이틀 바 + 하단 공고 카드 리스트 (카드는 가로 Flex) -->
        <section class="job-postings-section">
          <!-- 타이틀 바 (상단)
             [구조] 아이콘 + 타이틀 텍스트 가로 배치 -->
          <div class="job-postings-title-bar">
            <img
              src="./assets/icons/stay-at-home.png"
              alt="채용 공고 아이콘"
              class="sf-jp-title-icon"
            />
            <h3 class="sf-jp-title-text">채용 공고</h3>
          </div>

          <!-- 슬라이더 영역
             [구조] 이전 버튼(좌) + 카드 목록(중, overflow:hidden) + 다음 버튼(우) -->
          <div class="sf-jp-slider-area">
            <button
              class="sf-jp-arrow sf-jp-arrow--prev"
              id="sf-jp-arrow-prev"
              aria-label="이전 공고"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M13 4L7 10L13 16"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>

            <div class="sf-jp-slider-wrapper">
              <!-- job-postings.js가 이 컨테이너에 카드를 동적으로 렌더링합니다 -->
              <div class="job-postings-card-list" id="sf-jp-card-list"></div>
            </div>

            <button
              class="sf-jp-arrow sf-jp-arrow--next"
              id="sf-jp-arrow-next"
              aria-label="다음 공고"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M7 4L13 10L7 16"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>

          <!-- 페이지네이션 도트 — job-postings.js가 동적으로 생성 -->
          <div class="sf-jp-pagination" id="sf-jp-pagination"></div>
        </section>
      </main>

      <!-- ================================================
         Footer — 하단 바
         [구조] 카피라이트(좌) ←→ 링크(우), space-between 정렬
         ================================================ -->
      <footer>
        <div class="footer-container">
          <!-- 좌측: 로고 + 서비스명·카피라이트 -->
          <div class="footer-copyright-area">
            <img
              src="./assets/images/salesforce.png"
              alt="SF 취업 가이드 로고"
              class="ft-logo"
            />
            <div class="ft-brand-text">
              <span class="ft-service-name">SF 취업 가이드</span>
              <span class="ft-copyright"
                >© 2025 Team Name. All rights reserved.</span
              >
            </div>
          </div>

          <!-- 우측: 정책 링크 -->
          <div class="footer-link-area">
            <span class="ft-link-text">이용약관</span>
            <span class="ft-sep">|</span>
            <span class="ft-link-text">개인정보처리방침</span>
          </div>
        </div>
      </footer>
    </div>
    <script src="./job-header.js"></script>
    <script src="./job-illust.js"></script>
    <script src="./roadmap-card.js"></script>
    <script src="./core-competencies.js"></script>
    <script src="./gnb.js"></script>
    <script src="./job-postings.js"></script>
  </body>
</html>
